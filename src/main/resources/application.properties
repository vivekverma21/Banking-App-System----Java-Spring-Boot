spring.application.name=banking-app
server.port=8084

server.servlet.context-path=/JantaBank

#Configuring connection string(such as url, username, password, driver-class-name)
spring.datasource.url=jdbc:mysql://localhost:3306/boot4?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Configuring hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.open-in-view=false
